{% extends "base.html" %}
{% block title %}Admin - Tạo tài khoản{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-header">
            <div class="auth-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">👤</div>
            <h1>Tạo tài khoản học sinh</h1>
            <p class="auth-subtitle">Tạo tài khoản đơn lẻ cho học sinh</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <div class="input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <div class="input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <input type="text" id="username" name="username" placeholder="username" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <input type="text" id="password" name="password" placeholder="Mật khẩu cho học sinh" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Tạo tài khoản
            </button>
        </form>
        <div class="auth-footer">
            <p><a href="{{ url_for('admin_dashboard') }}">← Quay lại trang quản trị</a></p>
        </div>
    </div>
</div>
{% endblock %}
